<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Creación de Modelo</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Crear Modelo</h1>
        <form id="modelForm">
            <div class="form-group">
                <label for="title">Título</label>
                <input type="text" class="form-control" id="title" placeholder="Título">
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea class="form-control" id="description" rows="3" placeholder="Descripción"></textarea>
            </div>
            <div class="form-group">
                <label for="price">Precio</label>
                <input type="number" class="form-control" id="price" placeholder="Precio">
            </div>
            <div class="form-group">
                <label for="category">Categoría</label>
                <select class="form-control" id="category">
                    <option value="" disabled selected>Seleccione una categoría</option>
                    <option value="categoria1">Makeup</option>
                    <option value="categoria2">Skyn Care</option>
                    <option value="categoria3">Cuidado capilar</option>
                    <option value="categoria3">Cuidado corporal</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Crear Modelo</button>
        </form>
        <div id="alert" class="alert alert-danger mt-3 d-none"></div> <!-- Div para mostrar alertas -->
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
