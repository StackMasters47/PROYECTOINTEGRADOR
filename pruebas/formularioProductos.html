        <select class="form-select  mt-5 text-center" aria-label="Default select example" id="combobox1">

        <select clas="form-select text-center" aria-label="Default select example" id="combobox2">

        let categorias = ["Cuidado Corporal", "Cuidado Capilar", "Cuidado Facial", "Maquillaje"];

        let combobox1 = document.getElementById("combobox1");
        let combobox2 = document.getElementById("combobox2");

        function recorrer(combobox, valores) {
            combobox3.innerHTML = '';
            for (let index of valores) {
                combobox.innerHTML += `
            <option>$(index)</option>
            `
            }
        }
        function llenarCategorias() {
            recorrer(combobox1, categorias);
        }

        llenarCategorias();

        combobox1.addEventListener(`change`, (e) => {
            let dato = e.target.value

            switch (dato) {
                case `Cuidado Corporal`:
                    recorrer(combobox2, subcategorias.slice(0, 2))
                    break;
                case `Cuidado Capilar`:
                    recorrer(combobox2, subcategorias.slice(3, 5))
                    break;
                case `Cuidado Facial`:
                recorrer(combobox2, subcategorias.slice(6, 8))
                break;
                case `Maquillaje`:
                recorrer(combobox2, subcategorias.slice(9, 11))
                default:
                break;
            }
